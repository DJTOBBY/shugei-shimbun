lishedAt":"2026-07-18T10:15:00+09:00"},{"issueDate":"2026-07-20","issueLabel":"試作第2号","id":"feature-001","articleType":"FEATURE","title":"全国から手芸店が消えている。その先に何が残るのか","subtitle":"今週の特集","lead":"商店街を歩けば、シャッターが下りた手芸店に気づく人も多いだろう。後継者不足、EC化、大型店舗への集約——要因は一つではない。","category":"特集","tags":["特集","手芸店","小売"],"publishedAt":"2026-07-18T10:30:00+09:00"},{"issueDate":"2026-07-20","issueLabel":"試作第2号","id":"front-lead-kumiko","articleType":"NEWS","title":"刺繍アートフェスティバル、130作品の投票が佳境","subtitle":"結果発表は明日、グランプリの行方は","lead":"刺繍作品の公募コンテスト・展示会「刺繍アートフェスティバル2026」が本日、東京都内で最終日を迎える。","category":"総合","tags":["催事","刺繍","コンテスト"],"publishedAt":"2026-07-20T07:00:00+09:00"}];

  function issueUrl(a) {
    return 'issues/' + a.issueDate + '.html?goto=' + encodeURIComponent(a.id);
  }

  function formatDate(issueDate) {
    const [y, m, d] = issueDate.split('-');
    return y + '年' + parseInt(m, 10) + '月' + parseInt(d, 10) + '日';
  }

  const typeLabel = {
    NEWS: 'NEWS', CHIEF_EDITOR: 'コラム', EDITORIAL: '論説', FEATURE: '特集',
    MARKET: '市場', BUSINESS: '作家・ビジネス', CULTURE: '文化',
  };

  /* ===== 編集長コラム 連載一覧 ===== */
  function renderColumnSeries() {
    const columns = articles
      .filter((a) => a.articleType === 'CHIEF_EDITOR')
      .sort((a, b) => a.publishedAt.localeCompare(b.publishedAt));
    const list = document.getElementById('column-list');
    list.innerHTML = columns.map((a) => {
      const seriesMatch = (a.subtitle || '').match(/第(\d+)回/);
      const noLabel = seriesMatch ? '連載 第' + seriesMatch[1] + '回' : '号外コラム';
      return (
        '<li><a class="col-item" href="' + issueUrl(a) + '">' +
        '<div class="col-no">' + noLabel + '</div>' +
        '<div class="col-title">' + a.title + '</div>' +
        '<div class="col-meta">' + formatDate(a.issueDate) + '（' + a.issueLabel + '）</div>' +
        '</a></li>'
      );
    }).join('');
  }

  /* ===== 記事検索 ===== */
  const allTags = Array.from(new Set(articles.flatMap((a) => a.tags))).sort();
  let activeTag = null;

  function renderTagFilters() {
    const box = document.getElementById('tag-filters');
    box.innerHTML = allTags.map((t) =>
      '<button type="button" class="tag-chip" data-tag="' + t + '">' + t + '</button>'
    ).join('');
    box.querySelectorAll('.tag-chip').forEach((btn) => {
      btn.addEventListener('click', () => {
        activeTag = activeTag === btn.dataset.tag ? null : btn.dataset.tag;
        renderTagFilters();
        renderResults();
      });
      if (btn.dataset.tag === activeTag) btn.classList.add('active');
    });
  }

  function renderResults() {
    const q = document.getElementById('search-input').value.trim().toLowerCase();
    const filtered = articles.filter((a) => {
      const matchesTag = !activeTag || a.tags.includes(activeTag);
      if (!matchesTag) return false;
      if (!q) return true;
      const haystack = [a.title, a.lead, a.category, a.subtitle, ...a.tags].filter(Boolean).join(' ').toLowerCase();
      return haystack.includes(q);
    }).sort((a, b) => b.issueDate.localeCompare(a.issueDate));

    const list = document.getElementById('result-list');
    if (filtered.length === 0) {
      document.getElementById('result-count').textContent = '該当する記事が見つかりませんでした。';
      list.innerHTML = '';
      return;
    }
    document.getElementById('result-count').textContent = filtered.length + '件の記事';
    list.innerHTML = filtered.map((a) => (
      '<li><a class="result-item" href="' + issueUrl(a) + '">' +
      '<div class="result-top"><span class="r-badge">' + (typeLabel[a.articleType] || a.articleType) + '</span>' +
      '<span>' + formatDate(a.issueDate) + '（' + a.issueLabel + '）</span>' +
      '<span>' + a.category + '</span></div>' +
      '<div class="result-title">' + a.title + '</div>' +
      '<div class="result-lead">' + (a.lead || '') + '</div>' +
      '</a></li>'
    )).join('');
  }

  document.getElementById('search-input').addEventListener('input', renderResults);

  renderColumnSeries();
  renderTagFilters();
  renderResults();
</script>
